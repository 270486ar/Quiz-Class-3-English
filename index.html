<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fawn Kids Quiz Academy</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <div class="card">

    <!-- LOGO -->
    <img src="logo.png" alt="Fawn Kids Logo" class="logo">

    <!-- TITLE -->
    <h2 class="title">Fawn Kids Quiz Academy</h2>

    <!-- PROGRESS BAR -->
    <div class="progress">
      <div id="progressBar"></div>
    </div>

    <!-- QUESTION COUNT -->
    <p id="qCount"></p>

    <!-- QUIZ BOX -->
    <div id="quizBox">
      <h3 id="question">Loading...</h3>
      <div id="options"></div>
      <p id="feedback"></p>
    </div>

    <!-- NEXT BUTTON -->
    <button id="nextBtn">Next</button>

    <!-- RESULT BOX -->
    <div id="resultBox" class="hidden">
      <h2>Test Completed 🎉</h2>
      <p id="finalScore"></p>
      <button id="restartBtn">Restart</button>
    </div>

  </div>
</div>

<!-- IMPORTANT: LOAD ORDER -->
<script src="questions.js"></script>
<script src="script.js"></script>

</body>
</html>
