<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fawn Kids Quiz Academy</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <div class="card">

     <!-- TITLE -->
    <h1>Quiz Game</h1>

    <!-- TITLE -->
    <h2>Fawn Kids Quiz Academy</h2>

    <!-- PROGRESS -->
    <div class="progress">
      <div id="progressBar"></div>
    </div>

    <!-- QUESTION COUNT -->
    <p id="qCount"></p>

    <!-- LIVE SCORE -->
    <p id="liveScore">Score: 0/0</p>

    <!-- QUIZ -->
    <div id="quizBox">
      <h3 id="question">Loading...</h3>
      <div id="options"></div>
      <p id="feedback"></p>
    </div>

    <!-- NEXT -->
    <button id="nextBtn">Next</button>

    <!-- RESULT -->
    <div id="resultBox" class="hidden">
      <h2>Test Completed 🎉</h2>
      <p id="finalScore"></p>
      <button id="restartBtn">Restart</button>
    </div>

  </div>
</div>

<script src="questions.js"></script>
<script src="script.js"></script>

</body>
</html>
